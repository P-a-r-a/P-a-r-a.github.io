<!DOCTYPE html>
<html lang="en">

<body>
    <!-- LOADING SCREEN -->
    <section id="loading-screen">
        <div class="container">

            <div class="crater crater1"></div>

            <div class="crater crater3"></div>
            <div class="crater crater4"></div>
            <div class="crater crater5"></div>
            <div class="shadow"></div>
            <div class="eye eye-l"></div>
            <div class="eye eye-r"></div>
            <div class="mouth"></div>
            <div class="blush blush1"></div>
            <div class="blush blush2"></div>
        </div>

        <div class="orbit">
            <div class="rocket">
            <div class="window"></div>
            <div class="fire"></div>
            <div class="gas"></div>

            <div class="gas"></div>

            <div class="gas"></div>
            </div>
        </div>
        <div class="curve">
            <svg viewBox="0 0 500 500">
            <path
                id="loading"
                d="M73.2,148.6c4-6.1,65.5-96.8,178.6-95.6c111.3,1.2,170.8,90.3,175.1,97"

    <section id="hero">
        <p class="hero-tag">Portfolio · 2025</p>
        <h1 class="hero-name">
            <span class="line"><span>Parami</span></span>
            <span class="line"><span>Athukorala</span></span>
        </h1>
        <p class="hero-desc">
        A short, punchy description of who you are and what you do.
        Computer Science student · Web developer · Problem solver.
        </p>
        <div class="hero-scroll">
        <span class="hero-scroll-text">Scroll</span>
        <div class="hero-scroll-line"></div>
        </div>
    </section>

    <section id="projects"></section>

    <section id="skills"></section>

    <section id="contact-me"></section>

    <script type="module" src="loadingScreen.js"></script>
