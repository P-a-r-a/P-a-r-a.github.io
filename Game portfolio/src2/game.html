<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Game Mode — Your Name</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* ── GAME PAGE OVERRIDES ── */
    body { overflow: hidden; }

    /* Back button */
    #back-btn {
      position: fixed; top: 1.2rem; left: 1.5rem; z-index: 600;
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.55rem 1.1rem;
      background: rgba(28,28,28,0.9);
      border: 1px solid var(--grey-4);
      border-radius: 999px;
      color: var(--grey-2); font-size: 0.78rem; letter-spacing: 0.06em;
      text-decoration: none; cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      font-family: var(--font-body);
    }
    #back-btn:hover { border-color: var(--purple); color: var(--purple); }

    /* Controls hint */
    #controls-hint {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 600;
      background: rgba(28,28,28,0.9);
      border: 1px solid var(--grey-4);
      border-radius: 10px; padding: 0.75rem 1rem;
      font-size: 0.72rem; color: var(--grey-2);
      line-height: 1.7; letter-spacing: 0.04em;
    }
    #controls-hint kbd {
      display: inline-block; padding: 0.1rem 0.4rem;
      background: var(--bg-3); border: 1px solid var(--grey-3);
      border-radius: 4px; font-size: 0.7rem; color: var(--grey-1);
      font-family: monospace;
    }

    /* ── GAME CANVAS CONTAINER ── */
    #game-wrap {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    #game-canvas {
      display: block;
      background: transparent;
    }

    /* ── MILESTONE CARD OVERLAY ── */
    #milestone-card {
      position: fixed;
      top: 50%; right: 3rem;
      transform: translateY(-50%) translateX(120%);
      width: 300px;
      background: rgba(28,28,28,0.97);
      border: 1px solid rgba(139,92,246,0.4);
      border-radius: 16px;
      padding: 1.8rem;
      z-index: 700;
      transition: transform 0.45s cubic-bezier(0.22,1,0.36,1);
      backdrop-filter: blur(12px);
    }
    #milestone-card.visible { transform: translateY(-50%) translateX(0); }
    .mc-year {
      font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--purple); margin-bottom: 0.5rem;
    }
    .mc-title {
      font-family: var(--font-head); font-size: 1.15rem; font-weight: 700;
      color: var(--grey-1); margin-bottom: 0.6rem;
    }
    .mc-desc {
      font-size: 0.83rem; color: var(--grey-2); line-height: 1.65;
      margin-bottom: 1.4rem;
    }
    .mc-skills-label {
      font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--grey-3); margin-bottom: 0.8rem;
    }
    .mc-skill { margin-bottom: 0.8rem; }
    .mc-skill-top { display: flex; justify-content: space-between; margin-bottom: 0.3rem; }
    .mc-skill-name { font-size: 0.78rem; color: var(--grey-2); }
    .mc-skill-pct  { font-size: 0.72rem; color: var(--purple); }
    .mc-bar { height: 2px; background: var(--grey-4); border-radius: 1px; overflow: hidden; }
    .mc-fill {
      height: 100%; width: 0;
      background: linear-gradient(to right, var(--purple-dim), var(--purple));
      border-radius: 1px; transition: width 0.9s cubic-bezier(0.22,1,0.36,1);
    }
    .mc-close {
      position: absolute; top: 1rem; right: 1rem;
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--bg-3); border: 1px solid var(--grey-4);
      color: var(--grey-2); font-size: 0.8rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }
    .mc-close:hover { border-color: var(--purple); color: var(--purple); }

    /* ── SKILLS SIDEBAR (revealed in game) ── */
    #game-skills {
      position: fixed; left: 1.5rem; top: 50%;
      transform: translateY(-50%) translateX(-120%);
      width: 240px;
      background: rgba(28,28,28,0.95);
      border: 1px solid var(--grey-4);
      border-radius: 14px; padding: 1.4rem;
      z-index: 600;
      transition: transform 0.5s cubic-bezier(0.22,1,0.36,1);
      backdrop-filter: blur(10px);
    }
    #game-skills.visible { transform: translateY(-50%) translateX(0); }
    .gs-title {
      font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--grey-3); margin-bottom: 1.1rem;
    }
    .gs-skill { margin-bottom: 1rem; }
    .gs-top { display: flex; justify-content: space-between; margin-bottom: 0.3rem; }
    .gs-name { font-size: 0.78rem; color: var(--grey-2); }
    .gs-pct  { font-size: 0.7rem; color: var(--purple); }
    .gs-bar  { height: 2px; background: var(--grey-4); border-radius: 1px; overflow: hidden; }
    .gs-fill {
      height: 100%; width: 0;
      background: linear-gradient(to right, var(--purple-dim), var(--purple));
      border-radius: 1px; transition: width 0.8s cubic-bezier(0.22,1,0.36,1);
    }
  </style>
</head>
<body>

  <a id="back-btn" href="index.html">← Back to Portfolio</a>

  <div id="controls-hint">
    Move: <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> or <kbd>↑</kbd><kbd>←</kbd><kbd>↓</kbd><kbd>→</kbd><br>
    Interact: <kbd>E</kbd> or <kbd>Space</kbd>
  </div>

  <!-- Skills sidebar (slides in after first milestone) -->
  <div id="game-skills">
    <p class="gs-title">Skills Unlocked</p>
    <!-- Populated by game.js -->
  </div>

  <!-- Milestone card -->
  <div id="milestone-card">
    <button class="mc-close" id="mc-close">✕</button>
    <p class="mc-year" id="mc-year"></p>
    <h3 class="mc-title" id="mc-title"></h3>
    <p class="mc-desc" id="mc-desc"></p>
    <p class="mc-skills-label">Skills Gained</p>
    <div id="mc-skills-list"></div>
  </div>

  <div id="game-wrap">
    <canvas id="game-canvas"></canvas>
  </div>

  <script src="game.js"></script>
</body>
